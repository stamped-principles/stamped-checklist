name: Chromatic

on:
    push:
        branches:
            - main
    pull_request:

jobs:
    chromatic:
        name: Publish to Chromatic
        runs-on: ubuntu-latest
        permissions:
            contents: read
        # Skip if the CHROMATIC_PROJECT_TOKEN secret is not configured
        if: ${{ vars.CHROMATIC_ENABLED == 'true' || github.event_name == 'push' }}
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Publish to Chromatic
              uses: chromaui/action@v11
              with:
                  projectToken: ${{ secrets.CHROMATIC_PROJECT_TOKEN }}
                  buildScriptName: build-storybook
                  onlyChanged: true

name: Validate LinkML Data

on:
    pull_request:
        paths:
            - "src/checklist.js"
            - ".github/scripts/check_cross_refs.py"
            - ".github/workflows/validate.yml"
    workflow_dispatch:

jobs:
    validate:
        runs-on: ubuntu-latest

        steps:
            - name: Checkout repository
              uses: actions/checkout@v4

            - name: Set up Python
              uses: actions/setup-python@v5
              with:
                  python-version: "3.11"

            - name: Install LinkML
              run: pip install linkml

            - name: Download external schema files
              run: |
                  mkdir -p /tmp/schemas
                  curl -fsSL https://raw.githubusercontent.com/stamped-principles/stamped-principles-schema/main/stamped-principles-schema.yaml -o /tmp/schemas/stamped-principles-schema.yaml
                  curl -fsSL https://raw.githubusercontent.com/stamped-principles/stamped-principles-schema/main/stamped-principles.json -o /tmp/schemas/stamped-principles.json
                  curl -fsSL https://raw.githubusercontent.com/stamped-principles/stamped-checklist-schema/main/stamped-checklist-schema.yaml -o /tmp/schemas/stamped-checklist-schema.yaml
                  curl -fsSL https://raw.githubusercontent.com/stamped-principles/stamped-checklist-schema/main/stamped-checklist.json -o /tmp/schemas/stamped-checklist.json

            - name: Validate principles
              working-directory: /tmp/schemas
              run: linkml-validate --schema ./stamped-principles-schema.yaml --target-class PrincipleSet ./stamped-principles.json

            - name: Validate checklist
              working-directory: /tmp/schemas
              run: linkml-validate --schema ./stamped-checklist-schema.yaml --target-class Checklist ./stamped-checklist.json

            - name: Cross-schema referential integrity
              run: python ./.github/scripts/check_cross_refs.py --principles /tmp/schemas/stamped-principles.json --checklist /tmp/schemas/stamped-checklist.json

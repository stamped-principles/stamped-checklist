name: Check version bump

on:
    pull_request:
        paths:
            - src/checklist.json
            - src/checklist.schema.json

jobs:
    check-version-bump:
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4
              with:
                  fetch-depth: 0

            - name: Check VERSION was bumped
              run: |
                  BASE_VERSION=$(git show origin/${{ github.base_ref }}:src/checklist.schema.json 2>/dev/null | python -c 'import json,sys; s=sys.stdin.read().strip(); print("" if not s else json.loads(s).get("version",""), end="")')
                  PR_VERSION=$(python -c 'import json; print(json.load(open("src/checklist.schema.json")).get("version",""), end="")')
                  if [ -z "$PR_VERSION" ]; then
                    echo "::error file=src/checklist.schema.json::Could not extract version from checklist.schema.json. Ensure it contains: \"version\": \"x.y.z\"."
                    exit 1
                  fi
                  if [ -z "$BASE_VERSION" ]; then
                    echo "VERSION introduced as $PR_VERSION (no prior version on base branch) ✓"
                    exit 0
                  fi
                  echo "Base branch version: $BASE_VERSION"
                  echo "PR branch version:   $PR_VERSION"
                  if [ "$BASE_VERSION" = "$PR_VERSION" ]; then
                    echo "::error file=src/checklist.schema.json::Checklist content changed but version was not bumped (still \"$PR_VERSION\"). Please update src/checklist.schema.json."
                    exit 1
                  fi
                  echo "VERSION bumped from $BASE_VERSION to $PR_VERSION ✓"

name: REUSE Compliance

on:
    workflow_dispatch:
    pull_request:
    push:
        branches: [main]

jobs:
    reuse:
        name: REUSE specification check
        runs-on: ubuntu-latest
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: REUSE lint
              uses: fsfe/reuse-action@v5

name: Tests

on:
    workflow_dispatch:
    pull_request:

# Cancel superseded runs on the same ref so stale, hung runs don't pile up
# and keep occupying runners while a newer commit is already being tested.
concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    unit-tests:
        name: Unit tests (Vitest)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests with coverage
              run: npm run test:coverage

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/lcov.info
                  flags: unit
                  fail_ci_if_error: false
                  verbose: true

    integration-tests:
        name: Integration tests (Playwright)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            # Cache the downloaded browser binaries so re-runs don't re-download
            # them, and bound the install step so a hung apt/download fails fast
            # and surfaces as a re-runnable failure instead of a 6-hour hang.
            - name: Cache Playwright browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            - name: Install Playwright browsers
              timeout-minutes: 8
              run: npx playwright install chromium --with-deps

            - name: Run integration tests with coverage
              run: npm run test:e2e:coverage

            - name: Build integration coverage report
              run: npm run coverage:integration

            - name: Upload integration coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/integration/lcov.info
                  flags: integration
                  fail_ci_if_error: false
                  verbose: true

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

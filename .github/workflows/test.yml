name: Tests

on:
    workflow_dispatch:
    pull_request:

concurrency:
    group: ${{ github.workflow }}-${{ github.ref }}
    cancel-in-progress: true

jobs:
    unit-tests:
        name: Unit tests (Vitest)
        runs-on: ubuntu-latest
        timeout-minutes: 10
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            - name: Run unit tests with coverage
              run: npm run test:coverage

            - name: Upload coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/lcov.info
                  flags: unit
                  fail_ci_if_error: false
                  verbose: true

    integration-tests:
        name: Integration tests (Playwright)
        runs-on: ubuntu-latest
        timeout-minutes: 20
        permissions:
            contents: read
        steps:
            - name: Checkout
              uses: actions/checkout@v4

            - name: Set up Node.js
              uses: actions/setup-node@v4
              with:
                  node-version: lts/*
                  cache: npm

            - name: Install dependencies
              run: npm ci

            # Cache the downloaded browser binaries so re-runs skip the download
            # entirely once a cache is populated.
            - name: Cache Playwright browsers
              uses: actions/cache@v4
              with:
                  path: ~/.cache/ms-playwright
                  key: playwright-${{ runner.os }}-${{ hashFiles('package-lock.json') }}

            # System dependencies are reliable; install them separately so the
            # retry loop below only re-runs the flaky part.
            - name: Install Playwright system dependencies
              timeout-minutes: 5
              run: npx playwright install-deps chromium

            # Downloads from cdn.playwright.dev intermittently complete the first
            # artifact then stall indefinitely. Bound each attempt and retry so a
            # stalled connection is killed and re-tried on a fresh one instead of
            # hanging until the job-level timeout. On a cache hit this is a no-op.
            - name: Install Playwright browser
              timeout-minutes: 12
              run: |
                  for attempt in 1 2 3; do
                      echo "Playwright browser install attempt ${attempt}..."
                      if timeout 180 npx playwright install chromium; then
                          exit 0
                      fi
                      echo "::warning::Playwright browser download stalled or failed on attempt ${attempt}; retrying"
                      sleep 5
                  done
                  echo "::error::Playwright browser download failed after 3 attempts"
                  exit 1

            - name: Run integration tests with coverage
              run: npm run test:e2e:coverage

            - name: Build integration coverage report
              run: npm run coverage:integration

            - name: Upload integration coverage to Codecov
              uses: codecov/codecov-action@v5
              with:
                  token: ${{ secrets.CODECOV_TOKEN }}
                  files: ./coverage/integration/lcov.info
                  flags: integration
                  fail_ci_if_error: false
                  verbose: true

            - name: Upload Playwright report
              if: always()
              uses: actions/upload-artifact@v4
              with:
                  name: playwright-report
                  path: playwright-report/
                  retention-days: 7

id: https://github.com/stamped-principles/stamped-checklist
name: stamped-checklist
title: STAMPED Checklist Schema
description: >-
  LinkML schema modeling a tiered (MUST/SHOULD/MAY) checklist of STAMPED
  principles and their associated verification items.
license: CC-BY-4.0
version: 1.0.1

prefixes:
  linkml: https://w3id.org/linkml/
  schema: https://schema.org/
  rfc2119: https://datatracker.ietf.org/doc/html/rfc2119#
  stamped: https://github.com/stamped-principles/stamped-checklist/

imports:
  - linkml:types

enums:
  RequirementLevel:
    description: RFC 2119 requirement levels.
    permissible_values:
      must:
        title: MUST
        description: Absolute requirement.
        meaning: rfc2119:section-1
      should:
        title: SHOULD
        description: Strongly recommended.
        meaning: rfc2119:section-3
      may:
        title: MAY
        description: Optional / permissible.
        meaning: rfc2119:section-5

  PrincipleName:
    description: High-level principle categories.
    permissible_values:
      Self-containment:
      Tracking:
      Actionability:
      Portability:
      Distributability:
      Modularity:
      Ephemerality:

classes:
  Checklist:
    description: Top-level container for the full reproducibility checklist.
    tree_root: true
    class_uri: schema:ItemList
    attributes:
      version:
        description: Schema/content version string (e.g., "1.0.1").
        slot_uri: schema:version
        range: string
        required: true
        pattern: "^\\d+\\.\\d+\\.\\d+$"
      data:
        description: Ordered list of requirement-level groupings.
        slot_uri: schema:itemListElement
        range: LevelGroup
        multivalued: true
        inlined_as_list: true
        required: true

  LevelGroup:
    description: A group of principles sharing the same requirement level.
    class_uri: schema:ItemList
    attributes:
      level:
        description: The requirement level of this group.
        range: RequirementLevel
        required: true
      principles:
        description: Principles belonging to this level.
        slot_uri: schema:itemListElement
        range: Principle
        multivalued: true
        inlined_as_list: true
        required: true

  Principle:
    description: A single reproducibility principle with verification items.
    class_uri: schema:DefinedTerm
    id_prefixes:
      - stamped
    attributes:
      code:
        description: Short identifier for the principle (e.g., "S.1", "T.1 + T.3").
        slot_uri: schema:termCode
        range: string
        identifier: true
        required: true
      name:
        description: Category name for the principle.
        slot_uri: schema:name
        range: PrincipleName
        required: true
      description:
        description: Normative description of the principle.
        slot_uri: schema:description
        range: string
        required: true
      items:
        description: Checklist questions/items used to evaluate conformance.
        range: string
        multivalued: true
        required: true
        minimum_cardinality: 1

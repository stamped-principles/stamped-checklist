ci:
    autoupdate_schedule: quarterly

default_install_hook_types:
    - pre-commit

repos:
    - repo: https://github.com/pre-commit/mirrors-prettier
      rev: v4.0.0-alpha.8
      hooks:
          - id: prettier
            additional_dependencies:
                - prettier@3.1.0
    - repo: https://github.com/adrienverge/yamllint.git
      rev: v1.37.1
      hooks:
          - id: yamllint
